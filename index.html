<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinBot · Maurício Fidelis</title>
  <link rel="stylesheet" href="src/styles/main.css" />
</head>
<body>

  <!-- API Key Entry Screen -->
  <div id="api-key-screen">
    <div class="key-screen-logo">
      FinBot
      <span>Assistente Financeiro · Maurício Fidelis</span>
    </div>
    <form id="api-key-form" style="display:flex;flex-direction:column;gap:0.75rem;">
      <label class="key-screen-label" for="api-key-input">Anthropic API Key</label>
      <input
        id="api-key-input"
        type="password"
        placeholder="sk-ant-..."
        autocomplete="off"
        required
      />
      <p class="key-screen-hint">
        Your key is used only in this browser session and is never stored or sent anywhere other than the Anthropic API.
      </p>
      <button id="start-btn" type="submit">Iniciar conversa</button>
    </form>
  </div>

  <!-- Chat Application -->
  <div id="app" hidden>
    <!-- Header -->
    <header class="header">
      <div class="avatar">MF</div>
      <div class="header-info">
        <div class="header-name">Maurício Fidelis</div>
        <div class="header-sub">
          <span class="status-dot"></span>Assistente financeiro online
        </div>
      </div>
      <div id="stage-badge-slot"></div>
    </header>

    <!-- Messages -->
    <div class="chat-area" id="chat-area">
      <!-- Typing indicator (hidden by default) -->
      <div id="typing-indicator" hidden>
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- Quick Replies -->
    <div id="quick-replies-area"></div>

    <!-- Input -->
    <div class="input-area">
      <input
        id="msg-input"
        type="text"
        placeholder="Digite sua mensagem..."
        autocomplete="off"
      />
      <button id="send-btn" type="button" aria-label="Enviar">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
